line-length = 100
target-version = "py311"

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "S",   # flake8-bandit (security)
    "N",   # pep8-naming
]
ignore = [
    "S101",  # use of assert (needed in tests)
    "B008",  # do not perform function calls in default arguments (FastAPI Depends)
]

[lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S106"]  # allow assert + hardcoded passwords in tests

[format]
quote-style = "double"
indent-style = "space"
